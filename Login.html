<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocaTubeSong</title>
    <style>
        body {
            background-color: #ffe4b5;
            background-attachment: fixed;
            color: black;
            font-family: sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>
<h1>Login</h1>

 <!-- FORMULARIO DE ACCESO CON NOMBRE -->
<div style="outline: 2px solid #000; padding: 20px; margin: 10px; width: 300px; font-family: sans-serif;">
    <h3 style="margin-top: 0;">Your P Account</h3>
    <form id="auth-form">
        <label for="nombre" style="display: block; font-size: 12px;">Pname</label>
        <input type="text" id="nombre" placeholder="Sunny-P" required style="display: block; margin-bottom: 10px; width: 100%; box-sizing: border-box;">

        <label for="email" style="display: block; font-size: 12px;">email</label>
        <input type="email" id="email" placeholder="UWU@Voca@.com" required style="display: block; margin-bottom: 10px; width: 100%; box-sizing: border-box;">
        
        <label for="password" style="display: block; font-size: 12px;">create Paswword</label>
        <input type="password" id="password" placeholder="********" required style="display: block; margin-bottom: 10px; width: 100%; box-sizing: border-box;">
        
        <button type="submit" style="width: 100%; cursor: pointer;">Enter</button>
    </form>
</div>
  Filling out this form creates your account for you!

    Just fill in the required information here and you can create your account.
 
 

    
</body>
